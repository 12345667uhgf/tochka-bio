<!DOCTYPE html>
<html lang="en"> 
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tochka.</title>
</head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,
        #050505,
        #101010,
        #1c1c1c,
        #2c2c2c,
        #3e3e3e,
        #4c4c4c,
        #3e3e3e,
        #2c2c2c,
        #1c1c1c,
        #101010,
        #050505
    );
    background-repeat: no-repeat;
    background-size: 400% 400%;
    background-attachment: fixed;
    animation: bganimation 18s ease-in-out infinite;
    font-family: sans-serif;
    padding: 100px 100px;
}
.box {
    position: relative;
    z-index: 1;
}
@keyframes bganimation {
    0%   { background-position: 0% 50%; }
    20%  { background-position: 50% 20%; }
    40%  { background-position: 100% 50%; }
    60%  { background-position: 50% 100%; }
    80%  { background-position: 0% 80%; }
    100% { background-position: 0% 50%; }
}
.box {
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: fadeUp 0.6s ease both;
}
.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 20px;
    animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.06); }
}
h1 {
    color: white;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
}
.subtitle {
    color: rgba(255, 255, 255, 0.45);
    font-size: 14px;
    margin-bottom: 36px;
}
.links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
}
.btn {
    display: block;
    padding: 14px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    color: white;
    border: 1px solid #3a3a3a;
    background: #262626;
    transition: transform 0.2s ease, background 0.2s ease, border 0.2s ease;
    animation: fadeUp 0.6s ease both;
}
.btn:nth-child(1) { animation-delay: 0.1s; }
.btn:nth-child(2) { animation-delay: 0.2s; }
.btn:nth-child(3) { animation-delay: 0.3s; }
.btn:nth-child(4) { animation-delay: 0.4s; }
.btn:nth-child(5) { animation-delay: 0.5s; }
.btn:hover {
    transform: translateY(-3px);
    background: #303030;
    border-color: #4a4a4a;
}
.btn.telegram  { border-left: 3px solid rgba(255, 255, 255, 0.6); }
.btn.tiktok    { border-left: 3px solid rgba(255, 255, 255, 0.6); }
.btn.instagram { border-left: 3px solid rgba(255, 255, 255, 0.6); }
.btn.discord   { border-left: 3px solid rgba(255, 255, 255, 0.6); }
.btn.steam     { border-left: 3px solid rgba(255, 255, 255, 0.6); }
.footer {
    margin-top: 24px;
    color: rgba(255, 255, 255, 0.2);
    font-size: 12px;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
}
/* Mobile adaptation */
@media (max-width: 480px) {
    body {
        padding: 40px 20px;
    }
    .box {
        max-width: 100%;
        width: 100%;
    }
}
</style>
<body>
  <div class="box">
    <img src="https://i.pinimg.com/474x/07/e9/6b/07e96be9ca2620396abb3a6f714fd47f.jpg" alt="Avatar" class="avatar">
    <h1>tochka</h1>
    <p class="subtitle">Contact me on any of these platforms</p>
    <div class="links">
      <a href="https://t.me/tochka_navsegda" class="btn telegram">Telegram</a>
      <a href="https://www.tiktok.com/@_tochka_77?_r=1&_t=ZS-97DEpyqZOke" class="btn tiktok">TikTok</a>
      <a href="https://www.instagram.com/a__ars1an_?igsh=MXFoMTdteHRkemZ5bg==" class="btn instagram">Instagram</a>
      <a href="https://discord.gg/9EuBVFGP" class="btn discord">Discord</a>
      <a href="https://steamcommunity.com/profiles/76561199890695647/" class="btn steam">Steam</a>
    </div>
  </div>
  <p class="footer">© 2026 tochka.</p>
</body>
</html>
